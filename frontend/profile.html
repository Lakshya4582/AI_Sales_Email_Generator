<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile — AI Sales Email Generator</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

<script src="config.js"></script>
<script src="auth.js"></script>
<script>if (!requireAuth()) { /* redirected */ }</script>

<main class="app auth-app">
    <nav class="topbar">
        <span class="brand">AI Email Generator</span>
        <div class="topbar-right">
            <a href="index.html" class="ghost">← Back</a>
            <button class="ghost" onclick="logout()">Log out</button>
        </div>
    </nav>

    <header class="hero">
        <h1>Your profile</h1>
        <p class="subtitle">Update your account details or password.</p>
    </header>

    <section class="card">
        <h2>Account details</h2>
        <form id="profile-form" autocomplete="on">
            <div class="grid">
                <div class="field">
                    <label for="first_name">First name</label>
                    <input id="first_name" type="text" required autocomplete="given-name" />
                </div>
                <div class="field">
                    <label for="last_name">Last name</label>
                    <input id="last_name" type="text" required autocomplete="family-name" />
                </div>
            </div>

            <div class="field">
                <label>Email</label>
                <input id="email_display" type="email" disabled />
                <small class="optional">Email can't be changed.</small>
            </div>

            <div class="grid">
                <div class="field">
                    <label for="company">Company</label>
                    <input id="company" type="text" autocomplete="organization" />
                </div>
                <div class="field">
                    <label for="role">Role</label>
                    <input id="role" type="text" autocomplete="organization-title" />
                </div>
            </div>

            <button type="submit" class="primary" id="profile-btn">
                <span class="btn-label">Save changes</span>
                <span class="spinner" aria-hidden="true"></span>
            </button>
            <p id="profile-msg" class="form-msg" hidden></p>
        </form>
    </section>

    <section class="card">
        <h2>Change password</h2>
        <form id="password-form" autocomplete="off">
            <div class="field">
                <label for="current_password">Current password</label>
                <input id="current_password" type="password" required autocomplete="current-password" />
            </div>
            <div class="field">
                <label for="new_password">New password</label>
                <input id="new_password" type="password" required minlength="8" autocomplete="new-password" placeholder="At least 8 characters" />
            </div>

            <button type="submit" class="primary" id="password-btn">
                <span class="btn-label">Update password</span>
                <span class="spinner" aria-hidden="true"></span>
            </button>
            <p id="password-msg" class="form-msg" hidden></p>
        </form>
    </section>
</main>

<script>
function showMsg(el, text, isError) {
    el.textContent = text;
    el.className = "form-msg" + (isError ? " form-error" : " form-success");
    el.hidden = false;
}

async function loadProfile() {
    try {
        const res = await apiFetch("/me");
        if (!res.ok) return;
        const data = await res.json();
        document.getElementById("first_name").value = data.first_name || "";
        document.getElementById("last_name").value = data.last_name || "";
        document.getElementById("email_display").value = data.email || "";
        document.getElementById("company").value = data.company || "";
        document.getElementById("role").value = data.role || "";
    } catch { /* redirected on 401 */ }
}

document.getElementById("profile-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const btn = document.getElementById("profile-btn");
    const msg = document.getElementById("profile-msg");
    msg.hidden = true;
    btn.disabled = true;
    btn.classList.add("loading");
    btn.querySelector(".btn-label").textContent = "Saving";

    try {
        const res = await apiFetch("/me", {
            method: "PATCH",
            body: JSON.stringify({
                first_name: document.getElementById("first_name").value.trim(),
                last_name: document.getElementById("last_name").value.trim(),
                company: document.getElementById("company").value.trim(),
                role: document.getElementById("role").value.trim(),
            }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
            showMsg(msg, data.detail || `Update failed (${res.status})`, true);
            return;
        }
        showMsg(msg, "Profile updated.", false);
    } catch (err) {
        showMsg(msg, `Network error: ${err.message}`, true);
    } finally {
        btn.disabled = false;
        btn.classList.remove("loading");
        btn.querySelector(".btn-label").textContent = "Save changes";
    }
});

document.getElementById("password-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const btn = document.getElementById("password-btn");
    const msg = document.getElementById("password-msg");
    const current = document.getElementById("current_password");
    const next = document.getElementById("new_password");
    msg.hidden = true;
    btn.disabled = true;
    btn.classList.add("loading");
    btn.querySelector(".btn-label").textContent = "Updating";

    try {
        const res = await apiFetch("/change-password", {
            method: "POST",
            body: JSON.stringify({
                current_password: current.value,
                new_password: next.value,
            }),
        });
        if (res.status === 204) {
            showMsg(msg, "Password updated.", false);
            current.value = "";
            next.value = "";
            return;
        }
        const data = await res.json().catch(() => ({}));
        showMsg(msg, data.detail || `Update failed (${res.status})`, true);
    } catch (err) {
        showMsg(msg, `Network error: ${err.message}`, true);
    } finally {
        btn.disabled = false;
        btn.classList.remove("loading");
        btn.querySelector(".btn-label").textContent = "Update password";
    }
});

loadProfile();
</script>

</body>
</html>
